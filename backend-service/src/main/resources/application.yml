server:
  port: 8080

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_prep
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 6000ms

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your_deepseek_api_key}
      chat:
        options:
          model: deepseek-chat
      connect-timeout: 60
      read-timeout: 180
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:your_dashscope_api_key}
      embedding:
        options:
          model: text-embedding-v3
    # MCP Client 配置
    mcp:
      client:
        enabled: true
        name: interview-prep-mcp-client
        version: 1.0.0
        type: SYNC
        request-timeout: 60s
        # SSE 远程连接配置（按需启用）
        # sse:
        #   connections:
        #     my-remote-server:
        #       url: http://localhost:8081
        # STDIO 本地进程连接配置（按需启用）
        # stdio:
        #   connections:
        #     filesystem:
        #       command: cmd
        #       args:
        #         - "/c"
        #         - "npx"
        #         - "-y"
        #         - "@modelcontextprotocol/server-filesystem"
        #         - "D:\\rhy\\rag"
        toolcallback:
          enabled: true

zhipu:
  ai:
    api-key: ${ZHIPUAI_API_KEY:your_zhipuai_api_key}
    base-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    ocr-model: glm-4v
    timeout: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: interview-prep-jwt-secret-key-2026
  expiration: 86400000
