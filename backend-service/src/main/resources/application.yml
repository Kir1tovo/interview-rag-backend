server:
  port: 8080

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_prep
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 6000ms

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your_deepseek_api_key}
      chat:
        options:
          model: deepseek-chat
      connect-timeout: 60
      read-timeout: 180
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:your_dashscope_api_key}
      embedding:
        options:
          model: text-embedding-v3

zhipu:
  ai:
    api-key: ${ZHIPUAI_API_KEY:your_zhipuai_api_key}
    base-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    ocr-model: glm-4v
    timeout: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: interview-prep-jwt-secret-key-2026
  expiration: 86400000
